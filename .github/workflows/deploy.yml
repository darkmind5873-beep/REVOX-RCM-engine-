name: Deploy React App

on:
  push:
    branches:
      - main  # Triggers the build whenever you push to your main branch

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 20

      - name: Install Dependencies & Build
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist  # Vite outputs production files into the 'dist' folder
          branch: gh-pages
